services:
  - type: web
    name: wc2026-predictions
    env: node
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wc2026-db
          property: connectionString

databases:
  - name: wc2026-db
    databaseName: wc2026
    user: wc2026user
    plan: free
